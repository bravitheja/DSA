<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AlgoInsight | Senior DSA Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <h1>AlgoInsight</h1>
            <p>Mastering Patterns</p>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>

        <section class="sidebar-card">
          <h2>Mastery Progress</h2>
          <div class="stat-line">
            <span>Total Solved</span>
            <strong id="solvedCount">0 / 0</strong>
          </div>
          <div class="difficulty-rings">
            <div class="ring-wrap">
              <div id="easyRing" class="ring ring-easy">0%</div>
              <span>Easy</span>
            </div>
            <div class="ring-wrap">
              <div id="mediumRing" class="ring ring-medium">0%</div>
              <span>Medium</span>
            </div>
            <div class="ring-wrap">
              <div id="hardRing" class="ring ring-hard">0%</div>
              <span>Hard</span>
            </div>
          </div>
          <div id="sidebarBreakdown" class="sidebar-breakdown"></div>
        </section>

        <div id="timerDock" class="timer-dock">
          <section class="sidebar-card timer-panel" id="timerPanel" aria-label="Timer">
            <button
              type="button"
              id="timerDragHandle"
              class="timer-drag-handle"
              aria-label="Drag timer"
            >
              ⠿
            </button>
            <div class="timer-compact-top">
              <div class="timer-display-wrap">
                <input
                  id="timerTimeInput"
                  class="timer-time-input"
                  type="text"
                  inputmode="numeric"
                  autocomplete="off"
                  spellcheck="false"
                  aria-label="Time MM:SS or H:MM:SS"
                  title="e.g. 20:00 or 1:30:00"
                  value="20:00"
                />
                <div class="timer-progress-track" aria-hidden="true">
                  <div id="timerProgressFill" class="timer-progress-fill"></div>
                </div>
              </div>
              <div class="timer-inline-actions">
                <button type="button" id="timerPrimaryBtn" class="timer-primary-icon" aria-label="Start timer">▶</button>
                <button type="button" id="timerResetBtn" class="timer-reset-icon" title="Reset" aria-label="Reset timer">↻</button>
              </div>
            </div>
          </section>
        </div>
      </aside>

      <main class="main-pane">
        <header class="filter-bar" aria-label="Global filters">
          <label class="search-wrap" for="searchInput">
            <span>🔍</span>
            <input id="searchInput" type="text" placeholder="Search by name, pattern, or logic..." />
          </label>

          <select id="patternFilter" aria-label="Filter by pattern"></select>
          <select id="difficultyFilter" aria-label="Filter by difficulty">
            <option value="all">Difficulty: All</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
          
          <div class="filter-bar-split">
            <button onclick="pickRandom()" class="random-btn" title="Pick a random unmastered problem">🎲 Random</button>
            <button
              type="button"
              id="timerMobileToggle"
              class="timer-mobile-toggle"
              aria-controls="timerDock"
              aria-expanded="false"
              aria-label="Show timer"
            >
              ⏱
            </button>
          </div>
        </header>

        <section class="table-shell">
          <table>
            <thead>
              <tr>
                <th class="check-col">Done</th>
                <th>Problem</th>
                <th>Frequency</th>
                <th>Concept</th>
                <th>Complexity</th>
                <th>Difficulty</th>
                <th class="actions-col">Notes</th>
              </tr>
            </thead>
            <tbody id="problemsBody">
              <tr><td colspan="7" class="loading-state">Initializing tracker...</td></tr>
            </tbody>
          </table>
        </section>
        <nav class="pagination-bar" aria-label="Problems pagination">
          <button id="prevPageBtn" class="secondary-btn" type="button">← Prev</button>
          <span id="pageInfo" class="page-info">Page 1 of 1</span>
          <button id="nextPageBtn" class="secondary-btn" type="button">Next →</button>
        </nav>
      </main>
    </div>

    <aside id="notesSheet" class="notes-sheet" aria-hidden="true">
      <div class="sheet-header">
        <h3 id="sheetTitle">Problem Notes</h3>
        <button type="button" id="sheetCloseBtn" class="icon-btn">✕</button>
      </div>
      <div class="sheet-meta">
        <span id="autoSaveStatus" class="autosave-tag">Saved</span>
      </div>
      
      <div class="notes-container">
        <textarea id="sheetNotesInput" placeholder="Capture intuition, pitfalls, or code snippets (Markdown supported)..."></textarea>
        <div id="notesPreview" class="notes-preview hidden"></div>
      </div>

      <div class="sheet-footer">
        <button type="button" id="togglePreviewBtn" class="secondary-btn">Preview</button>
        <button type="button" id="sheetSaveBtn" class="save-btn">Close & Save</button>
      </div>
    </aside>

    <template id="problemRowTemplate">
      <tr>
        <td class="check-cell"><input type="checkbox" class="mastered-check"></td>
        <td class="problem-cell"></td>
        <td class="frequency-cell"></td>
        <td class="concept-cell"></td>
        <td class="complexity-cell"></td>
        <td class="difficulty-cell"></td>
        <td class="actions-cell"></td>
      </tr>
    </template>

    <!-- data.js: same data as data.json, for file:// (fetch cannot load local files). Regenerate: node scripts/build-data-js.mjs -->
    <script src="data.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
