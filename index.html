<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoInsight | DSA Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <h1>AlgoInsight</h1>
            <p>Mastering Patterns</p>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>

        <section class="sidebar-card">
          <h2>Your Progress</h2>
          <div class="stat-line">
            <span>Total Solved</span>
            <strong id="solvedCount">0 / 0</strong>
          </div>
          <div class="difficulty-rings">
            <div class="ring-wrap">
              <div id="easyRing" class="ring ring-easy">0%</div>
              <span>Easy</span>
            </div>
            <div class="ring-wrap">
              <div id="mediumRing" class="ring ring-medium">0%</div>
              <span>Medium</span>
            </div>
            <div class="ring-wrap">
              <div id="hardRing" class="ring ring-hard">0%</div>
              <span>Hard</span>
            </div>
          </div>
          <div id="sidebarBreakdown" class="sidebar-breakdown"></div>
        </section>
      </aside>

      <main class="main-pane">
        <header class="filter-bar" aria-label="Global filters">
          <label class="search-wrap" for="searchInput">
            <span>🔍</span>
            <input id="searchInput" type="text" placeholder="Search by name or logic..." />
          </label>

          <select id="patternFilter" aria-label="Filter by pattern"></select>
          <select id="difficultyFilter" aria-label="Filter by difficulty">
            <option value="all">Difficulty: All</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </header>

        <section class="table-shell">
          <table>
            <thead>
              <tr>
                <th class="check-col">Done</th>
                <th>Problem</th>
                <th>Frequency</th>
                <th>Concept</th>
                <th>Complexity</th>
                <th>Difficulty</th>
                <th class="actions-col">Notes</th>
              </tr>
            </thead>
            <tbody id="problemsBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <aside id="notesSheet" class="notes-sheet" aria-hidden="true">
      <div class="sheet-header">
        <h3 id="sheetTitle">Notes</h3>
        <button id="sheetCloseBtn" class="icon-btn" type="button" aria-label="Close notes">✕</button>
      </div>
      <div class="sheet-meta">
        <p class="sheet-subtitle">Supports Markdown (**bold**, `code`).</p>
        <span id="autoSaveStatus" class="autosave-tag">Saved</span>
      </div>
      
      <div class="notes-container">
        <textarea id="sheetNotesInput" placeholder="Capture intuition, pitfalls..."></textarea>
        <div id="notesPreview" class="notes-preview hidden"></div>
      </div>

      <div class="sheet-footer">
        <button id="togglePreviewBtn" class="secondary-btn">Preview</button>
        <button id="sheetSaveBtn" class="save-btn" type="button">Close & Save</button>
      </div>
    </aside>

    <template id="problemRowTemplate">
      <tr>
        <td class="check-cell"><input type="checkbox" class="mastered-check"></td>
        <td class="problem-cell"></td>
        <td class="frequency-cell"></td>
        <td class="concept-cell"></td>
        <td class="complexity-cell"></td>
        <td class="difficulty-cell"></td>
        <td class="actions-cell"></td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
