<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoInsight</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <div>
            <h1>AlgoInsight</h1>
            <p>DSA Tracker</p>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>

        <section class="sidebar-card">
          <h2>Stats</h2>
          <div class="stat-line">
            <span>Total solved</span>
            <strong id="solvedCount">0 / 0</strong>
          </div>
          <div class="difficulty-rings">
            <div class="ring-wrap">
              <div id="easyRing" class="ring ring-easy">0%</div>
              <span>Easy</span>
            </div>
            <div class="ring-wrap">
              <div id="mediumRing" class="ring ring-medium">0%</div>
              <span>Medium</span>
            </div>
            <div class="ring-wrap">
              <div id="hardRing" class="ring ring-hard">0%</div>
              <span>Hard</span>
            </div>
          </div>
        </section>
      </aside>

      <main class="main-pane">
        <header class="filter-bar" aria-label="Global filters">
          <label class="search-wrap" for="searchInput">
            <span>🔍</span>
            <input id="searchInput" type="text" placeholder="Search problem by name..." />
          </label>

          <select id="patternFilter" aria-label="Filter by pattern"></select>
          <select id="difficultyFilter" aria-label="Filter by difficulty">
            <option value="all">Difficulty: All</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
        </header>

        <section class="table-shell">
          <table>
            <thead>
              <tr>
                <th>Problem</th>
                <th>Pattern</th>
                <th>Complexity</th>
                <th>Difficulty</th>
                <th class="actions-col">Actions</th>
              </tr>
            </thead>
            <tbody id="problemsBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <aside id="notesSheet" class="notes-sheet" aria-hidden="true">
      <div class="sheet-header">
        <h3 id="sheetTitle">Notes</h3>
        <button id="sheetCloseBtn" class="icon-btn" type="button" aria-label="Close notes">✕</button>
      </div>
      <p class="sheet-subtitle">Capture intuition, pitfalls, and revision reminders.</p>
      <textarea id="sheetNotesInput" placeholder="Write notes..."></textarea>
      <button id="sheetSaveBtn" class="save-btn" type="button">Save Notes</button>
    </aside>

    <template id="problemRowTemplate">
      <tr>
        <td class="problem-cell" data-label="Problem"></td>
        <td class="pattern-cell" data-label="Pattern"></td>
        <td class="complexity-cell" data-label="Complexity"></td>
        <td class="difficulty-cell" data-label="Difficulty"></td>
        <td class="actions-cell" data-label="Actions"></td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
