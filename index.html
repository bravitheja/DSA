<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoInsight</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>AlgoInsight</h1>
          <p class="subtitle">Master patterns. Track progress. Crack interviews.</p>
        </div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
      </header>

      <section class="summary-card">
        <div class="summary-grid">
          <div class="summary-item">
            <span>Total Problems</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="summary-item">
            <span>Mastered</span>
            <strong id="completedCount">0</strong>
          </div>
          <div class="summary-item">
            <span>Progress</span>
            <strong id="progressPercent">0%</strong>
          </div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section class="controls">
        <label class="control-field">
          <span>Search</span>
          <input id="searchInput" type="text" placeholder="Search problem name" />
        </label>

        <label class="control-field">
          <span>Pattern</span>
          <select id="patternFilter"></select>
        </label>

        <label class="control-field">
          <span>Sub Pattern</span>
          <select id="subPatternFilter"></select>
        </label>

        <label class="control-field">
          <span>Difficulty</span>
          <select id="difficultyFilter"></select>
        </label>

        <label class="control-field">
          <span>Frequency</span>
          <select id="frequencyFilter"></select>
        </label>

        <label class="control-field">
          <span>Sort</span>
          <select id="sortSelect">
            <option value="default">Default</option>
            <option value="difficulty">Difficulty (Easy → Hard)</option>
            <option value="frequency">Frequency (High → Low)</option>
            <option value="alpha">Alphabetical (A-Z)</option>
          </select>
        </label>
      </section>

      <section class="column-toggle-wrap">
        <span>Column visibility:</span>
        <label><input type="checkbox" class="column-toggle" data-column="frequency" checked /> Frequency</label>
        <label><input type="checkbox" class="column-toggle" data-column="complexity" checked /> Complexity</label>
      </section>

      <section class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th data-col="problem">Problem</th>
              <th data-col="concept">Concept</th>
              <th data-col="difficulty">Difficulty</th>
              <th data-col="frequency">Frequency</th>
              <th data-col="complexity">Complexity</th>
              <th data-col="status">Status</th>
              <th data-col="notes">Notes</th>
            </tr>
          </thead>
          <tbody id="problemsBody"></tbody>
        </table>
      </section>
    </div>

    <template id="problemRowTemplate">
      <tr>
        <td data-col="problem" class="problem-cell" data-label="Problem"></td>
        <td data-col="concept" class="concept-cell" data-label="Concept"></td>
        <td data-col="difficulty" data-label="Difficulty"><span class="difficulty-badge"></span></td>
        <td data-col="frequency" data-label="Frequency"><span class="frequency-badge"></span></td>
        <td data-col="complexity" class="complexity-cell" data-label="Complexity"></td>
        <td data-col="status" data-label="Status">
          <select class="status-select" aria-label="Problem status">
            <option value="Not Started">Not Started</option>
            <option value="Revising">Revising</option>
            <option value="Mastered">Mastered</option>
          </select>
        </td>
        <td data-col="notes" data-label="Notes">
          <textarea class="notes-input" rows="2" placeholder="Add notes..."></textarea>
        </td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
