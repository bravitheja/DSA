# Deploy static site to GitHub Pages and inject OAuth / sync URL from repo secrets.
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   GOOGLE_CLIENT_ID       — OAuth 2.0 Web client ID (same as Apps Script property GOOGLE_CLIENT_ID)
#   DSA_SYNC_WEB_APP_URL   — Deployed SyncWebApp.gs URL (Anyone can access)
#
# Do NOT add SPREADSHEET_ID here — it stays only in Apps Script Script properties (server-side).

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master, colour_tags]
  workflow_dispatch: # manual run: Actions → Deploy GitHub Pages → Run workflow

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write auth-config.js from secrets
        run: |
          cat > auth-config.js <<EOF
          window.__DSA_CONFIG__ = {
            googleClientId: "${{ secrets.GOOGLE_CLIENT_ID }}",
            syncWebAppUrl: "${{ secrets.DSA_SYNC_WEB_APP_URL }}",
          };
          window.__DSA_AUTH__ = { enabled: false, mode: "none" };
          EOF

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
